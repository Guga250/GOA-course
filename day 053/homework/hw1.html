<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .mom {
            display:grid;
            height:750px;
            width:800px;
            border:black solid 1px;
            grid-template-columns: repeat(4,200px);
            grid-template-rows: 300px 50px 150px 250px;
            gap:10px;
        }
        .child:nth-child(1) {
            background-color:wheat;
            grid-column-start: 1;
            grid-column-end: 2;
            grid-row-start: 1;
            grid-row-end: 3;
        }
        .child:nth-child(2) {
            background-color: blue;
            grid-column-start: 2;
            grid-column-end: 4;
            grid-row-start: 1;
            grid-row-end: 2;
        }
        .child:nth-child(3) {
            background-color: rgb(239, 179, 255);
            grid-column-start: 4;
            grid-column-end: 5;
            grid-row-start: 1;
            grid-row-end: 4;
        }
        .child:nth-child(4) {
            background-color: yellow;
            grid-column-start:1 ;
            grid-column-end:2;
            grid-row-start: 3;
            grid-row-end: 5;
        }
        .child:nth-child(5){
            background-color: gray;
            grid-column-start: 2;
            grid-column-end: 3;
            grid-row-start: 2;
            grid-row-end: 3;
        }
        .child:nth-child(6) {
            background-color: yellow;
            grid-column-start: 3;
            grid-column-end: 4;
            grid-row-start: 2;
            grid-row-end: 4;
        }
        .child:nth-child(7) {
            background-color: blue;
            grid-column-start: 3;
            grid-column-end: 5;
            grid-row-start: 4;
            grid-row-end: 5;
        }
        .child:nth-child(8) {
            background-color: gray;
            grid-column-start: 2;
            grid-column-end: 3;
            grid-row-start: 3;
            grid-row-end: 5;
        }
    </style>
</head>
<body>
    <div class="mom">
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
    </div>
</body>
</html>
